services:
  - type: web
    name: market-intel-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --access-logfile - --error-logfile -
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Market Intelligence Platform
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: false
      - key: MONGODB_URL
        sync: false   # Set in Render dashboard
      - key: MONGODB_DB_NAME
        value: market_intel
      - key: NEWS_API_KEY
        sync: false   # Set in Render dashboard
      - key: RATE_LIMIT_PER_MINUTE
        value: 60
      - key: CACHE_TTL_SECONDS
        value: 300
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: 3.11.0
